# Cloudflare Worker for Lendpile: Neon Postgres API + admin API
# Deploy: from this directory run: npm ci && npx wrangler deploy
# Required secrets:
#   npx wrangler secret put NEON_DATABASE_URL
#   npx wrangler secret put NEON_AUTH_URL
#   npx wrangler secret put NEON_AUTH_JWKS_URL
# Optional:
#   npx wrangler secret put LENDPILE_ADMIN_EMAILS
#   npx wrangler secret put ADMIN_SECRET
#   npx wrangler secret put ADMIN_TOTP_SECRET

name = "lendpile-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
